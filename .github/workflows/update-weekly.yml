name: Update Weekly Data

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Kiel spending + GeoConfirmed events
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Refresh Kiel spending
        run: npx tsx scripts/prebuild-spending.ts

      - name: Refresh GeoConfirmed events (post-ACLED gap fill)
        run: npm run data:events

      - name: Create PR if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/kiel-spending.json public/data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="chore/weekly-data-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: weekly data update (Kiel + GeoConfirmed)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: weekly data update (Kiel + GeoConfirmed)" \
            --body "Automated weekly update of Kiel Institute bilateral aid data and GeoConfirmed events (post-ACLED timeline gap fill)." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
