name: Update Kiel Spending Data

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update spending data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/prebuild-spending.ts

      - name: Create PR if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/kiel-spending.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="chore/update-spending-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update Kiel spending data"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update Kiel spending data" \
            --body "Automated weekly update of Kiel Institute bilateral aid data." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
